# ==============================================================================
# 7. PROMETHEUS/GRAFANA METRICS (Optional, via curl in automation)
# ==============================================================================
# If you want to export metrics to Prometheus for Grafana visualization,
# you can add this to your automation:
#
# - alias: "Export metrics to Prometheus"
#   trigger:
#     platform: time_pattern
#     minutes: "/5"
#   action:
#     - service: shell_command.export_to_prometheus
#
# And in shell_command:
#   export_to_prometheus: |
#     curl -s http://localhost:8000/api/station/latest \
#       -H "Authorization: Bearer $(cat ~/.config/deyecli/config | grep DEYE_TOKEN)" \
#       -d '{"station_id": "YOUR_STATION_ID"}' | \
#       jq '.data | to_entries[] | "\(.key){instance=\"deye\"} \(.value)"' >> /tmp/deye_metrics.prom

# ==============================================================================
# USAGE NOTES:
# ==============================================================================
#
# 1. Set the input_text helpers with your actual values:
#    - input_text.deye_token: Your bearer token from "deyecli.sh token"
#    - input_text.deye_api_host: Your server host:port (e.g., 192.168.1.100:8000)
#    - input_text.deye_device_sn: Your device serial number
#    - input_text.deye_station_id: Your station ID
#
# 2. Verify the API server is running and accessible:
#    curl -H "Authorization: Bearer YOUR_TOKEN" http://localhost:8000/api/station/list
#
# 3. Check Home Assistant logs for any errors:
#    Settings > System > Logs (or journalctl -u home-assistant -f)
#
# 4. For debugging REST commands:
#    - Developer Tools > States: Check if entities are created
#    - Developer Tools > Services: Manually call rest_command.deye_get_station_latest
#
# 5. Adjust update frequency as needed (every 5 min, 10 min, etc.)
